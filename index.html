<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Go Chronicle</title>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      body { background: #0a0a0f; overflow: hidden; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script>
      // Force clear all caches and service workers
      if ('serviceWorker' in navigator) {
        navigator.serviceWorker.getRegistrations().then(function(regs) {
          for (var r of regs) r.unregister();
        });
      }
      if ('caches' in window) {
        caches.keys().then(function(names) {
          for (var n of names) caches.delete(n);
        });
      }
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
