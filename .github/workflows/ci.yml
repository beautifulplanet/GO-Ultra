name: CI — Go Chronicle

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  rust-tests:
    name: Rust Engine Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go-engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry & build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            go-engine/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('go-engine/Cargo.lock') }}

      - name: Run cargo test
        run: cargo test --all-features

  wasm-build:
    name: WASM Build
    runs-on: ubuntu-latest
    needs: rust-tests
    defaults:
      run:
        working-directory: go-engine
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            go-engine/target
          key: ${{ runner.os }}-wasm-${{ hashFiles('go-engine/Cargo.lock') }}

      - name: Build WASM
        run: wasm-pack build --target web --out-dir ../pkg

      - name: Upload WASM artifact
        uses: actions/upload-artifact@v4
        with:
          name: wasm-pkg
          path: pkg/

  frontend-build:
    name: Frontend Build
    runs-on: ubuntu-latest
    needs: wasm-build
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Download WASM artifact
        uses: actions/download-artifact@v4
        with:
          name: wasm-pkg
          path: pkg/

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: Build for production
        run: npm run build
